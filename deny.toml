# cargo-deny configuration for rate-net.
# Schema reference: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # RUSTSEC-2025-0141 — bincode marked unmaintained (team ceased
    # development after a doxxing incident; v1.3.3 / v2.0.1 are the final
    # versions). bincode is a `[dev-dependencies]` benchmark fixture
    # only — it is the reference implementation we measure ourselves
    # against in `benches/comparative.rs`. It is never compiled into
    # `pack-io` itself and is never on a downstream user's dependency
    # graph. The unmaintained status does not affect pack-io's runtime
    # safety, only the fixture's long-term updatability — which is
    # acceptable for a benchmark target frozen at v2.0.1.
    "RUSTSEC-2025-0141",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
